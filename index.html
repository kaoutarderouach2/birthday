<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/hat.png" type="image/png">
<title>Secret Code</title>

<link rel="stylesheet" href="styleMessage.css">

<style>

.secret-container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

.secret-container h1{
font-family:"Titan One";
font-size:3rem;
color:#e72a36;
text-shadow:4px 4px #333;
}

.secret-input{
padding:15px;
font-size:20px;
border-radius:10px;
border:3px solid #333;
text-align:center;
}

.secret-btn{
padding:12px 30px;
font-size:18px;
border-radius:40px;
background:#e72a36;
color:white;
border:3px solid #333;
cursor:pointer;
font-family:"Sriracha";
}

.secret-btn:hover{
background:#ad0f1a;
}

</style>

</head>

<body>

<div id="wrapper">

<div class="secret-container">

<h1>Enter the secret date 🎂</h1>

<input class="secret-input" id="code" placeholder="DDMM">

<button class="secret-btn" onclick="checkCode()">Enter</button>

</div>

</div>

<script>

function checkCode(){

let code=document.getElementById("code").value

if(code==="1103"){

window.location="Memory.html"

}else{

alert("Wrong date 😜")

}

}

</script>

</body>
</html>
